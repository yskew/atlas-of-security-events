name: SecurityEvents pipeline

# Two scheduled runs per day, in BST (British Summer Time = UTC+1). GitHub cron
# is UTC-only, so the times below are written in UTC:
#   23:00 UTC = 00:00 BST  (midnight UK — the primary run)
#   04:30 UTC = 05:30 BST  (second run, 30 min after the first 5h window ends)
# First run is capped at 5h (RUN_MAX_MINUTES) so it finishes ~05:00 BST; the
# second resumes the city sweep from the bookmark, so the two cover the whole
# list each day. NOTE: GitHub can't auto-adjust for DST — in GMT (winter) these
# fire one hour later in local UK time (01:00 / 06:30). Manual runs are still
# available from the Actions tab (workflow_dispatch) but are never required.
on:
  schedule:
    - cron: "0 23 * * *"   # 23:00 UTC = 00:00 BST
    - cron: "30 4 * * *"   # 04:30 UTC = 05:30 BST
  workflow_dispatch: {}

# Never let a second run start while one is still going (the bookmark is shared
# state); queue it instead of running both against the same cursor.
concurrency:
  group: securityevents-pipeline
  cancel-in-progress: false

# Least-privilege: this job only reads the repo to run the pipeline.
permissions:
  contents: read

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # Hard safety just under GitHub's 6h job kill. Our soft cap (RUN_MAX_MINUTES)
    # stops the work cleanly at ~5h and saves the bookmark well before this fires.
    timeout-minutes: 330

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          # Same Neon database as local runs, so the city bookmark is shared.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # 5h soft cap — stop cleanly, save the bookmark, resume next run.
          RUN_MAX_MINUTES: "300"
          # 0 = no fixed extraction cap; time + full sweep govern the run.
          MAX_EXTRACT_PER_RUN: "0"
        run: python -m pipeline.run
